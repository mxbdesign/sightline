<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: radial-gradient(ellipse at top, rgba(13, 27, 42, 0.95) 0%, rgba(26, 37, 47, 0.95) 60%, rgba(13, 27, 42, 0.95) 100%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
  }
  #game-container {
    position: relative; width: 800px; height: 600px;
    border: 3px solid rgba(255,255,255,0.15); border-radius: 12px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
    background: #4a7c3f;
    overflow: hidden;
  }
  #texture-overlay {
    position: absolute; inset: 0; pointer-events: none;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.12'/%3E%3C/svg%3E");
    mix-blend-mode: overlay; z-index: 10;
  }
</style>
</head>
<body>
<div id="game-container">
  <div style="width: 200px; height: 200px; background: #c0392b; position: absolute; top: 100px; left: 100px;"></div>
  <div style="width: 200px; height: 200px; background: #2980b9; position: absolute; top: 100px; left: 400px;"></div>
  <div id="texture-overlay"></div>
</div>
</body>
</html>
